name: Python Quality (reusable)

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to test against"
        type: string
        default: '["3.12", "3.13"]'
      ruff-args:
        description: "Arguments to pass to ruff check"
        type: string
        default: "."
      mypy-targets:
        description: "Space-separated mypy targets (empty string to skip)"
        type: string
        default: ""
      extra-checks:
        description: "Additional shell commands to run before lint (empty to skip)"
        type: string
        default: ""

jobs:
  lint_and_typecheck:
    name: Lint and Typecheck (py3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run extra checks
        if: inputs.extra-checks != ''
        run: ${{ inputs.extra-checks }}

      - name: Run Ruff
        run: ruff check ${{ inputs.ruff-args }}

      - name: Run mypy
        if: inputs.mypy-targets != ''
        run: mypy ${{ inputs.mypy-targets }}

  tests:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pytest
        run: pytest
